  <text x="550" y="745" text-anchor="middle" font-size="11" fill="#a3a3a3" font-style="italic">7+ agent design patterns &#183; PM + Designer fixed &#183; Human-in-the-Loop (reject &#8594; +8 turns) &#183; MIT &#183; TRAE 2026 Grand Prize</text>
