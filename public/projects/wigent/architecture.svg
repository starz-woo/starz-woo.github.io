    <text x="100" y="136" text-anchor="middle" font-size="9" fill="#737373">turn 3</text>

    <circle cx="280" cy="80" r="6" fill="#7c3aed"/>
    <text x="280" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">retire &#43; spawn</text>
    <text x="280" y="136" text-anchor="middle" font-size="9" fill="#737373">turn 12</text>

    <circle cx="600" cy="80" r="6" fill="#7c3aed"/>
    <text x="600" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">retire &#43; spawn</text>
    <text x="600" y="136" text-anchor="middle" font-size="9" fill="#737373">turn 22</text>

