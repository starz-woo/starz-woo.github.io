    <rect x="280" y="48" width="320" height="22" rx="4" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1"/>
    <text x="440" y="63" text-anchor="middle" font-size="10" fill="#6d28d9">late-debate (turns 15&#8211;24)</text>

    <rect x="600" y="48" width="340" height="22" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="770" y="63" text-anchor="middle" font-size="10" fill="#92400e">closing (25&#8211;29, forced convergence)</text>

