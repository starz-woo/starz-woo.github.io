    <text x="20" y="30" font-size="11" font-weight="600" fill="#a3a3a3" letter-spacing="2">ORCHESTRATOR</text>
    <text x="20" y="58" font-size="18" font-weight="700" fill="#0a0a0a">AsyncGenerator&lt;SSEEvent&gt;</text>
    <text x="20" y="78" font-size="12" fill="#737373">orchestrator.ts &#183; POST /api/debate</text>

