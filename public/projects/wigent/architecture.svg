    <rect x="492" y="14" width="260" height="80" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="506" y="35" font-size="11" font-weight="600" fill="#6d28d9" letter-spacing="1">PATH 2 &#183; BACKGROUND</text>
